name: CI

# PR 생성/갱신(→main) 및 main 푸시(머지) 시 전체 테스트 + 커버리지 측정.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests + Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle (cache + wrapper 검증)
        uses: gradle/actions/setup-gradle@v4

      # pjacoco는 미게시(Maven Central/Plugin Portal 준비 중) — 공식 소비 방식대로 소스를 빌드해
      # mavenLocal에 게시한다(PUBLISHING.md). e2e 모듈의 pjacoco testkit 의존이 컴파일 시 해소된다.
      - name: pjacoco 소스 빌드 → mavenLocal (e2e testkit 의존 해소)
        env:
          PJACOCO_REF: main
        run: bash scripts/setup-pjacoco.sh

      - name: 전체 테스트 + 집계 커버리지
        run: ./gradlew test testCodeCoverageReport --no-daemon

      - name: 커버리지 요약 (Job Summary)
        if: always()
        run: python3 scripts/coverage-summary.py >> "$GITHUB_STEP_SUMMARY"

      - name: 커버리지 리포트 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/build/reports/jacoco/testCodeCoverageReport/

      - name: 테스트 리포트 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/build/reports/tests/test/'

  report-generator:
    name: Report generator (make_html.py)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: make_html.py 회귀 테스트
        run: python3 -m unittest discover -s petclinic-demo -p 'test_*.py' -v

  agent-skill:
    name: Agent Skill (tia) smoke — E2E-1.5
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle (cache)
        uses: gradle/actions/setup-gradle@v4

      - name: fat-jar 빌드
        run: ./gradlew :tia-cli:shadowJar --no-daemon

      - name: 스킬 스모크(wrapper end-to-end + 사전점검 실패)
        run: TIA_JAR="$PWD/tia-cli/build/libs/tia.jar" bash skills/tia/test/skill-smoke.sh

  security:
    name: SBOM + 취약점 스캔 (게이트)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle (cache)
        uses: gradle/actions/setup-gradle@v4

      - name: SBOM(CycloneDX) 생성
        run: ./gradlew :tia-cli:cyclonedxBom --no-daemon

      - name: SBOM 업로드
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: tia-cli/build/reports/bom.json

      - name: 취약점 스캔 (Trivy SBOM, HIGH/CRITICAL 시 실패)
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b "$RUNNER_TEMP/bin"
          "$RUNNER_TEMP/bin/trivy" sbom --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1 tia-cli/build/reports/bom.json

  docker-e2e:
    name: Container E2E (real teamscale agent)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle (cache)
        uses: gradle/actions/setup-gradle@v4

      - name: teamscale 에이전트 다운로드
        run: bash scripts/download-agent.sh

      - name: SUT/CLI 아티팩트 + 테스트 의존성 캐시 워밍
        run: ./gradlew :fixture-app:bootJar :fixture-app:classes :fixture-app:testClasses :tia-cli:installDist --no-daemon

      - name: 컨테이너 간 블랙박스 E2E (sut ↔ tester)
        run: docker compose -f docker-compose.e2e.yml up --abort-on-container-exit --exit-code-from tester

  parallel-e2e:
    name: Parallel collection E2E (pjacoco)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle (cache)
        uses: gradle/actions/setup-gradle@v4

      - name: pjacoco 해소 + 병렬 E2E (실패 시 fail — skip 아님)
        env:
          PJACOCO_REF: main
        run: bash scripts/run-parallel-e2e.sh
