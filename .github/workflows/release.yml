name: Release

# 태그(v*) 푸시 시: 라이브러리/CLI를 GitHub Packages에 게시 + fat-jar(tia.jar)를 Release 자산으로 첨부.
on:
  push:
    tags: ['v*']

permissions:
  contents: write    # GitHub Release 생성 + 자산 업로드
  packages: write    # GitHub Packages 게시

jobs:
  release:
    name: Publish (GitHub Packages) + fat-jar asset
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # ── 릴리스 게이트: SBOM 생성 → 취약점 스캔(HIGH/CRITICAL 시 실패 → 게시 차단) ──
      - name: SBOM(CycloneDX) 생성
        run: ./gradlew :tia-cli:cyclonedxBom --no-daemon

      - name: 취약점 스캔 (Trivy SBOM 게이트)
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b "$RUNNER_TEMP/bin"
          "$RUNNER_TEMP/bin/trivy" sbom --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1 tia-cli/build/reports/bom.json

      - name: 게시 (tia-core · tia-cli → GitHub Packages) + fat-jar 빌드
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew :tia-core:publish :tia-cli:publish :tia-cli:shadowJar --no-daemon

      - name: 라이선스 고지 + SBOM 번들(자산용)
        run: |
          mkdir -p dist
          cp LICENSE THIRD-PARTY-NOTICES.md tia-cli/build/reports/bom.json dist/
          cp -r licenses dist/
          (cd dist && zip -qr tia-licenses.zip LICENSE THIRD-PARTY-NOTICES.md licenses)

      - name: GitHub Release + tia.jar + 고지 + SBOM 자산
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" tia-cli/build/libs/tia.jar dist/THIRD-PARTY-NOTICES.md dist/tia-licenses.zip dist/bom.json --title "$GITHUB_REF_NAME" --generate-notes
