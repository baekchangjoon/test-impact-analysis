name: Publish image

# 태그(v*) 푸시 시: tia CLI 이미지를 ghcr 에 빌드·푸시 (impact-only, JDK17 + fat-jar).
on:
  push:
    tags: ['v*']

permissions:
  contents: read
  packages: write

jobs:
  image:
    name: Build & push ghcr image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: fat-jar 빌드 (이미지가 COPY)
        run: ./gradlew :tia-cli:shadowJar --no-daemon

      - name: ghcr 로그인
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build + push
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/tia
          TAG: ${{ github.ref_name }}
        run: |
          docker build -f docker/Dockerfile -t "$IMAGE:$TAG" -t "$IMAGE:latest" .
          docker push "$IMAGE:$TAG"
          docker push "$IMAGE:latest"
